name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & type-check (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Type-check and build (src)
        run: npm run build

      - name: Type-check tests
        run: npx tsc --noEmit

  smoke-tests:
    name: Smoke tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Smoke tests (MEMFS)
        run: npm run test:fast

      - name: Smoke tests (tomefs)
        run: TOMEFS_BACKEND=tomefs npm run test:fast

      - name: Smoke tests (preload backend)
        run: TOMEFS_BACKEND=preload npm run test:fast

  full-tests:
    name: Full test suite (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Full test suite (MEMFS)
        run: npm test

      - name: Full test suite (tomefs)
        run: TOMEFS_BACKEND=tomefs npm test

  preload-backend-tests:
    name: PreloadBackend conformance (graceful degradation)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Conformance tests (preload backend)
        run: TOMEFS_BACKEND=preload npx vitest run tests/conformance/

      - name: Workload tests (preload backend)
        run: TOMEFS_BACKEND=preload npx vitest run tests/workload/ tests/scribe-data/

      - name: Adversarial tests (preload backend)
        run: TOMEFS_BACKEND=preload npx vitest run tests/adversarial/

  small-cache-tests:
    name: Small-cache stress (4-page cache)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Conformance tests (tomefs, 4-page cache)
        run: TOMEFS_BACKEND=tomefs TOMEFS_MAX_PAGES=4 npx vitest run tests/conformance/

      - name: Workload tests (tomefs, 4-page cache)
        run: TOMEFS_BACKEND=tomefs TOMEFS_MAX_PAGES=4 npx vitest run tests/workload/ tests/scribe-data/

      - name: Adversarial tests (tomefs, 4-page cache)
        run: TOMEFS_BACKEND=tomefs TOMEFS_MAX_PAGES=4 npx vitest run tests/adversarial/

      - name: Fuzz tests (tomefs, 4-page cache)
        run: TOMEFS_BACKEND=tomefs TOMEFS_MAX_PAGES=4 npx vitest run tests/fuzz/

      - name: Integration tests (tomefs, 4-page cache)
        run: TOMEFS_BACKEND=tomefs TOMEFS_MAX_PAGES=4 npx vitest run tests/integration/
